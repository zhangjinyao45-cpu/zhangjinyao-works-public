<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>蒸馏分身，替我开会！· 评审会现场</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">

  <script>
    window.AIPM_MODE = new URLSearchParams(location.search).get('mode') || 'solo';
  </script>
</head>
<body>
  <div class="grain-overlay"></div>

  <div id="app">
    <!-- 顶栏 -->
    <header class="masthead">
      <div class="masthead-left">
        <div class="brand">
          <span class="brand-mark">蒸馏分身，替我开会！</span>
          <span class="brand-tagline">— Distilled Avatars · Roundtable on Your Behalf —</span>
        </div>
      </div>
      <div class="masthead-center">
        <div class="dateline">
          <span class="issue-no" id="stage-num">No. --</span>
          <span class="issue-divider">·</span>
          <span class="issue-name" id="stage-name">--</span>
        </div>
        <div class="masthead-rule"></div>
      </div>
      <div class="masthead-right">
        <button id="btn-tts" class="ctrl-btn" title="语音朗读">
          <span class="ctrl-icon">♪</span>
        </button>
        <button id="btn-speed" class="ctrl-btn" title="播放速度">
          <span class="ctrl-icon">1×</span>
        </button>
      </div>
    </header>

    <!-- 主舞台 -->
    <main class="theatre">
      <div class="spotlight" id="spotlight"></div>
      <div class="floor"></div>
      <div class="stage-rug"></div>
      <div class="boardroom-table">
        <div class="boardroom-table-surface">
          <div class="boardroom-table-emblem">
            <span class="emblem-symbol">✦</span>
            <span class="emblem-text">THE PANEL</span>
            <span class="emblem-symbol">✦</span>
          </div>
        </div>
        <div class="boardroom-table-rim"></div>
        <div class="boardroom-table-shadow"></div>
      </div>

      <canvas id="live2d-canvas"></canvas>
      <div class="characters" id="characters"></div>
      <div class="bubbles" id="bubbles"></div>

      <!-- 推镜头 vignette（zoom-in 时遮罩边缘，强化电影感） -->
      <div class="cine-vignette" id="cine-vignette"></div>

      <!-- Solo 模式专用：大气泡（可点击跳转） -->
      <div class="solo-bubble" id="solo-bubble">
        <div class="solo-bubble-content" id="solo-bubble-content"></div>
        <div class="solo-bubble-hint">点击继续</div>
      </div>

      <!-- 评审会大对话框（全屏新画面，左侧 Live2D 全身 + 名字 / 右侧打字机） -->
      <div class="cine-dialog" id="cine-dialog" aria-hidden="true">
        <div class="cine-dialog-card">
          <!-- 左：人物全身 Live2D 区 -->
          <aside class="cine-dialog-portrait">
            <div class="cine-portrait-glow"></div>
            <canvas id="cine-portrait-canvas"></canvas>
            <div class="cine-portrait-info">
              <div class="cine-portrait-name" id="cine-portrait-name">周明</div>
              <div class="cine-portrait-role" id="cine-portrait-role">LEAD PM</div>
            </div>
            <div class="cine-portrait-stripe"></div>
          </aside>
          <!-- 右：发言区 -->
          <section class="cine-dialog-body">
            <div class="cine-dialog-overline" id="cine-dialog-overline">TESTIMONY</div>
            <div class="cine-dialog-content" id="cine-dialog-content"></div>
            <div class="cine-dialog-footer">
              <span class="cine-dialog-hint" id="cine-dialog-hint">正在发言…</span>
              <button class="cine-dialog-btn" id="cine-dialog-btn" disabled>继续 ▸</button>
            </div>
          </section>
        </div>
      </div>

      <div class="reading-sheet" id="reading-sheet">
        <div class="reading-sheet-paper">
          <div class="reading-sheet-overline" id="reading-sheet-overline">FINALE</div>
          <h2 class="reading-sheet-title" id="reading-sheet-title">周明的收束</h2>
          <div class="reading-sheet-content" id="reading-sheet-content"></div>
          <button class="reading-sheet-btn" id="reading-sheet-btn">继续</button>
        </div>
      </div>
    </main>

    <!-- 底部控制（仅 review 模式显示） -->
    <footer class="podium" id="podium" style="display: none;">
      <div class="podium-progress">
        <div class="podium-counter">
          <span class="counter-current" id="progress-current">00</span>
          <span class="counter-divider">/</span>
          <span class="counter-total" id="progress-total">00</span>
        </div>
        <div class="podium-track">
          <div class="podium-bar" id="progress-bar"></div>
        </div>
        <div class="podium-label" id="progress-label">PRELUDE</div>
      </div>
      <div class="podium-controls">
        <button id="btn-prev" class="podium-btn" disabled>◂</button>
        <button id="btn-play" class="podium-btn podium-main">
          <span class="podium-main-text">播放</span>
        </button>
        <button id="btn-next" class="podium-btn" disabled>▸</button>
      </div>
    </footer>

    <!-- 决策点弹窗 -->
    <div class="verdict-modal" id="decision-modal">
      <div class="verdict-paper">
        <div class="verdict-corner verdict-corner-tl"></div>
        <div class="verdict-corner verdict-corner-tr"></div>
        <div class="verdict-corner verdict-corner-bl"></div>
        <div class="verdict-corner verdict-corner-br"></div>
        <div class="verdict-overline">— 待决议 —</div>
        <h2 class="verdict-title">决策点</h2>
        <div class="verdict-subtitle">评审会已收敛，等你拍板</div>
        <div class="verdict-list" id="decision-list"></div>
        <button class="verdict-close" id="btn-close-decision">暂不拍板，稍后再说</button>
      </div>
    </div>

    <!-- 加载遮罩 -->
    <div class="loading-curtain" id="loading-overlay">
      <div class="loading-mark loading-mark-zh">
        <span>蒸</span><span>馏</span><span>分</span><span>身</span>
      </div>
      <div class="loading-text" id="loading-text">准备中...</div>
    </div>
  </div>

  <!-- Live2D -->
  <script src="js/data-loader.js"></script>
  <script src="js/live2d-loader.js"></script>
  <script src="js/stage-manager.js"></script>
  <script src="js/dialogue-player.js"></script>
  <script src="js/theatre-controller.js"></script>
</body>
</html>
