<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIPM · 决策拍板</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --wood-darkest: #1a0f08;
      --wood-dark: #2a1a0f;
      --brass: #c89943;
      --brass-light: #d4af37;
      --paper: #f4ecd8;
      --paper-edge: #b8a578;
      --paper-ink: #2a1f15;
      --ink-soft: #6a5743;
      --font-display: 'Cormorant Garamond', 'Noto Serif SC', serif;
      --font-serif-zh: 'Noto Serif SC', serif;
      --font-sans-zh: 'Noto Sans SC', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      font-family: var(--font-sans-zh);
      color: var(--paper);
      background:
        radial-gradient(circle at top, rgba(200, 153, 67, 0.08), transparent 28%),
        linear-gradient(180deg, var(--wood-darkest), var(--wood-dark));
      padding: 32px 20px 48px;
    }

    .shell {
      max-width: 980px;
      margin: 0 auto;
    }

    .hero {
      text-align: center;
      margin-bottom: 28px;
    }

    .hero-overline {
      font-family: var(--font-display);
      font-size: 12px;
      color: var(--brass);
      letter-spacing: 0.4em;
      margin-bottom: 10px;
    }

    .hero-title {
      font-family: var(--font-serif-zh);
      font-size: clamp(32px, 5vw, 52px);
      font-weight: 900;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }

    .hero-desc {
      max-width: 560px;
      margin: 0 auto;
      color: rgba(244, 236, 216, 0.78);
      line-height: 1.8;
      font-size: 15px;
    }

    .board {
      background: linear-gradient(180deg, rgba(244, 236, 216, 0.07), rgba(244, 236, 216, 0.03));
      border: 1px solid rgba(212, 175, 55, 0.22);
      border-radius: 6px;
      padding: 24px;
      backdrop-filter: blur(12px);
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.25);
    }

    .status-note {
      color: rgba(244, 236, 216, 0.76);
      text-align: center;
      padding: 40px 16px;
      line-height: 1.8;
    }

    .decision {
      background: var(--paper);
      color: var(--paper-ink);
      border-radius: 4px;
      padding: 20px 22px;
      margin-bottom: 18px;
      border-left: 4px solid var(--brass);
    }

    .decision-id {
      font-family: var(--font-display);
      color: var(--brass);
      font-size: 12px;
      letter-spacing: 0.28em;
      margin-bottom: 8px;
    }

    .decision-question {
      font-family: var(--font-serif-zh);
      font-size: 22px;
      font-weight: 700;
      line-height: 1.5;
      margin-bottom: 10px;
    }

    .decision-background {
      color: var(--ink-soft);
      line-height: 1.8;
      margin-bottom: 18px;
      font-size: 14px;
    }

    .decision-options {
      display: grid;
      gap: 12px;
    }

    .option {
      border: 1px solid rgba(42, 31, 21, 0.14);
      border-radius: 4px;
      padding: 14px 16px;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
      background: rgba(255, 255, 255, 0.65);
      position: relative;
    }

    .option:hover {
      border-color: rgba(200, 153, 67, 0.7);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.08);
      transform: translateY(-1px);
    }

    .option.selected {
      border-color: var(--brass);
      box-shadow: 0 0 0 2px rgba(200, 153, 67, 0.18);
      background: rgba(244, 236, 216, 0.92);
    }

    .option.selected::after {
      content: '已选';
      position: absolute;
      top: 12px;
      right: 14px;
      border-radius: 999px;
      background: var(--brass);
      color: #22150c;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 8px;
      letter-spacing: 0.08em;
    }

    .option-head {
      display: flex;
      gap: 10px;
      align-items: baseline;
      margin-bottom: 6px;
    }

    .option-key {
      font-family: var(--font-display);
      font-size: 18px;
      color: var(--brass);
      min-width: 24px;
    }

    .option-label {
      font-weight: 700;
      line-height: 1.5;
    }

    .option-desc {
      color: var(--ink-soft);
      line-height: 1.7;
      font-size: 14px;
    }

    .decision-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 18px;
    }

    .decision-recommendation {
      color: var(--ink-soft);
      font-size: 13px;
    }

    .decision-btn, .primary-btn, .secondary-btn {
      border: 0;
      border-radius: 4px;
      cursor: pointer;
      font-family: var(--font-serif-zh);
      font-weight: 700;
      letter-spacing: 0.14em;
      transition: transform 0.2s, opacity 0.2s, box-shadow 0.2s;
    }

    .decision-btn, .primary-btn {
      background: linear-gradient(180deg, var(--brass-light), var(--brass));
      color: #22150c;
      padding: 12px 18px;
      box-shadow: 0 10px 20px rgba(200, 153, 67, 0.22);
    }

    .secondary-btn {
      background: transparent;
      color: var(--paper);
      border: 1px solid rgba(212, 175, 55, 0.28);
      padding: 12px 16px;
    }

    .decision-btn:disabled, .primary-btn:disabled, .secondary-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      box-shadow: none;
    }

    .decision-btn:hover:not(:disabled), .primary-btn:hover:not(:disabled), .secondary-btn:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    .footer {
      margin-top: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .footer-text {
      color: rgba(244, 236, 216, 0.72);
      font-size: 14px;
    }

    @media (max-width: 720px) {
      .board { padding: 18px; }
      .decision { padding: 18px; }
      .decision-question { font-size: 18px; }
      .decision-actions, .footer {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div class="hero-overline">DECISION BOARD</div>
      <h1 class="hero-title">现在轮到你拍板</h1>
      <p class="hero-desc">圆桌上的分歧已经收敛成明确选项。这里不是继续听观点，而是把下一阶段的方向定下来。</p>
    </section>

    <section class="board" id="board">
      <div class="status-note">正在整理本轮待决议事项...</div>
    </section>
  </div>

  <script>
    const API_BASE = (location.protocol === 'file:' ? 'http://localhost:3000' : location.origin) + '/api';
    const params = new URLSearchParams(location.search);
    const projectId = params.get('project');
    const stageNum = params.get('stage') || '00';
    const preselectedChoices = readPreselectedChoices();

    const stageNames = {
      '00': '需求头脑风暴',
      '00.5': '竞品分析',
      '01': '提示增强',
      '02': 'PRD',
      '03': '线框图',
      '04': '高保真原型',
    };

    if (!projectId) {
      renderMessage('缺少 project 参数');
    } else {
      loadDecisions();
    }

    async function loadDecisions() {
      try {
        const res = await fetch(`${API_BASE}/projects/${encodeURIComponent(projectId)}/decisions?status=pending`);
        const result = await res.json();
        if (!result.success) throw new Error(result.error?.message || '加载失败');
        renderDecisions(result.data.pendingDecisions || []);
      } catch (err) {
        renderMessage(`加载决策失败：${err.message}`);
      }
    }

    function renderMessage(message) {
      document.getElementById('board').innerHTML = `
        <div class="status-note">${message}</div>
        <div class="footer">
          <div class="footer-text">当前阶段：${stageNames[stageNum] || stageNum}</div>
          <button class="secondary-btn" onclick="location.href='status.html?project=${encodeURIComponent(projectId || '')}'">返回状态页</button>
        </div>
      `;
    }

    function renderDecisions(decisions) {
      if (!decisions.length) {
        renderMessage('这一轮没有待拍板决策，系统将直接进入下一阶段。');
        setTimeout(() => {
          location.href = `status.html?project=${encodeURIComponent(projectId)}`;
        }, 1200);
        return;
      }

      document.getElementById('board').innerHTML = `
        ${decisions.map((decision, index) => `
          <article class="decision" data-decision-id="${decision.id}">
            <div class="decision-id">DECISION · ${String(index + 1).padStart(2, '0')}</div>
            <div class="decision-question">${decision.question}</div>
            <div class="decision-background">${decision.background || '这项决策来自本轮评审的核心分歧。'}</div>
            <div class="decision-options">
              ${(decision.options || []).map(option => `
                <div class="option${preselectedChoices[decision.id] === option.id ? ' selected' : ''}" data-opt-id="${option.id}">
                  <div class="option-head">
                    <div class="option-key">${option.id}</div>
                    <div class="option-label">${option.label}</div>
                  </div>
                  <div class="option-desc">${option.description || '无补充说明'}</div>
                </div>
              `).join('')}
            </div>
            <div class="decision-actions">
              <div class="decision-recommendation">${decision.recommendation ? `建议倾向：${decision.recommendation}` : '本项暂无系统建议'}</div>
              <button class="decision-btn" data-submit-id="${decision.id}">确认拍板</button>
            </div>
          </article>
        `).join('')}
        <div class="footer">
          <div class="footer-text">本轮拍板完成后，将返回圆桌，由周明宣布进入下一阶段。</div>
          <button class="secondary-btn" onclick="location.href='status.html?project=${encodeURIComponent(projectId)}'">稍后再说</button>
        </div>
      `;

      bindDecisionEvents();
    }

    function decisionPreselectKey() {
      return `aipm-decision-preselect:${projectId}:${stageNum}`;
    }

    function readPreselectedChoices() {
      if (!projectId) return {};
      try {
        return JSON.parse(sessionStorage.getItem(decisionPreselectKey()) || '{}');
      } catch {
        return {};
      }
    }

    function bindDecisionEvents() {
      document.querySelectorAll('.option').forEach((optionEl) => {
        optionEl.addEventListener('click', () => {
          const parent = optionEl.closest('.decision');
          parent.querySelectorAll('.option').forEach((el) => el.classList.remove('selected'));
          optionEl.classList.add('selected');
        });
      });

      document.querySelectorAll('.decision-btn').forEach((button) => {
        button.addEventListener('click', async () => {
          const card = button.closest('.decision');
          const selected = card.querySelector('.option.selected');
          if (!selected) {
            alert('先选一个方向，再提交拍板。');
            return;
          }

          const decisionId = button.dataset.submitId;
          const choice = selected.dataset.optId;
          button.disabled = true;
          button.textContent = '提交中...';

          try {
            const res = await fetch(`${API_BASE}/projects/${encodeURIComponent(projectId)}/decisions/${decisionId}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ choice }),
            });
            const result = await res.json();
            if (!result.success) throw new Error(result.error?.message || '提交失败');

            button.textContent = '已拍板';
            card.style.opacity = '0.72';
            card.querySelectorAll('.option').forEach((el) => {
              el.style.pointerEvents = 'none';
            });

            const remaining = [...document.querySelectorAll('.decision-btn')]
              .some((el) => el.textContent !== '已拍板');

            if (!remaining) {
              await announceNextStage();
            }
          } catch (err) {
            button.disabled = false;
            button.textContent = '确认拍板';
            alert(`提交失败：${err.message}`);
          }
        });
      });
    }

    async function announceNextStage() {
      try {
        const res = await fetch(`${API_BASE}/projects/${encodeURIComponent(projectId)}/status`);
        const result = await res.json();
        if (!result.success) throw new Error(result.error?.message || '获取状态失败');

        const meta = result.data;
        const isComplete = meta.globalState === 'completed' || meta.currentState === 'completed';
        const nextStage = meta.currentStage;

        if (isComplete) {
          const message = '好，最终方向已经拍板。AIPM 流水线到此完成，最终原型和导出清单都已经准备好。';
          setTimeout(() => {
            location.href =
              `theatre.html?mode=solo&speaker=zhou-ming&project=${encodeURIComponent(projectId)}&stage=04&message=${encodeURIComponent(message)}&next=${encodeURIComponent('status.html?project=' + encodeURIComponent(projectId))}`;
          }, 500);
          return;
        }

        // 根据下一阶段类型决定跳转
        // 只有 00 和 02 需要圆桌评审，其他阶段跳过评审直接推进
        const REVIEW_STAGES = ['00', '02'];
        let soloMessage, nextUrl;

        if (nextStage === '00.5') {
          soloMessage = '好，阶段 0 已拍板。现在进入阶段 0.5——顾清，去把竞品和市场数据拉回来。';
          nextUrl = `workbench.html?project=${encodeURIComponent(projectId)}&stage=00.5`;
        } else if (nextStage === '01') {
          soloMessage = '好，竞品分析完成。周明现在去整理增强提示词，给下游打好地基。';
          nextUrl = `workbench.html?project=${encodeURIComponent(projectId)}&stage=01`;
        } else if (nextStage === '02') {
          soloMessage = '好，提示增强已就绪。周明去写 PRD，这次会有圆桌评审。';
          nextUrl = `workbench.html?project=${encodeURIComponent(projectId)}&stage=02`;
        } else if (nextStage === '03') {
          soloMessage = '好，PRD 已确认。苏予去画线框图和交互规范，把骨架搭起来。';
          nextUrl = `workbench.html?project=${encodeURIComponent(projectId)}&stage=03`;
        } else if (nextStage === '04') {
          soloMessage = '好，线框图已过。苏予去做高保真原型，这是最后一关。';
          nextUrl = `workbench.html?project=${encodeURIComponent(projectId)}&stage=04`;
        } else {
          soloMessage = `好，方向定了。现在进入阶段 ${nextStage}。`;
          nextUrl = `status.html?project=${encodeURIComponent(projectId)}`;
        }

        setTimeout(() => {
          location.href =
            `theatre.html?mode=solo&speaker=zhou-ming&project=${encodeURIComponent(projectId)}&stage=${encodeURIComponent(nextStage)}&message=${encodeURIComponent(soloMessage)}&next=${encodeURIComponent(nextUrl)}`;
        }, 500);
      } catch (err) {
        alert(`获取下一阶段失败：${err.message}`);
      }
    }
  </script>
</body>
</html>
