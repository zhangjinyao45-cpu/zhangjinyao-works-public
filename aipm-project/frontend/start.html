<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIPM · 启动新项目</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --wood-darkest: #1a0f08;
      --wood-dark: #2a1a0f;
      --brass: #c89943;
      --brass-light: #d4af37;
      --paper: #f4ecd8;
      --paper-ink: #2a1f15;
      --font-display: 'Cormorant Garamond', 'Noto Serif SC', serif;
      --font-serif-zh: 'Noto Serif SC', serif;
      --font-sans-zh: 'Noto Sans SC', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-sans-zh);
      background: linear-gradient(180deg, var(--wood-darkest) 0%, var(--wood-dark) 100%);
      color: var(--paper);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .startup-container {
      max-width: 600px;
      width: 100%;
      background: rgba(244, 236, 216, 0.04);
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 4px;
      padding: 48px 40px;
      position: relative;
    }

    .startup-container::before, .startup-container::after {
      content: '';
      position: absolute;
      width: 60px; height: 60px;
      border: 1px solid var(--brass);
      opacity: 0.6;
    }
    .startup-container::before { top: -8px; left: -8px; border-right: 0; border-bottom: 0; }
    .startup-container::after { bottom: -8px; right: -8px; border-left: 0; border-top: 0; }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-mark {
      font-family: var(--font-display);
      font-size: 36px;
      font-weight: 700;
      color: var(--brass-light);
      letter-spacing: 0.2em;
      display: block;
      margin-bottom: 8px;
    }

    .logo-subtitle {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 14px;
      color: var(--brass);
      letter-spacing: 0.15em;
    }

    .form-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-family: var(--font-serif-zh);
      font-size: 14px;
      color: var(--brass-light);
      margin-bottom: 8px;
      letter-spacing: 0.1em;
    }

    input, textarea {
      width: 100%;
      background: rgba(244, 236, 216, 0.08);
      border: 1px solid rgba(212, 175, 55, 0.25);
      color: var(--paper);
      font-family: var(--font-sans-zh);
      font-size: 15px;
      padding: 12px 16px;
      border-radius: 4px;
      transition: all 0.3s;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--brass-light);
      background: rgba(244, 236, 216, 0.12);
      box-shadow: 0 0 16px rgba(212, 175, 55, 0.2);
    }

    textarea {
      resize: vertical;
      min-height: 120px;
      line-height: 1.6;
    }

    .hint {
      font-size: 12px;
      color: rgba(212, 175, 55, 0.6);
      margin-top: 6px;
      font-style: italic;
    }

    .btn-start {
      width: 100%;
      background: linear-gradient(180deg, var(--brass) 0%, #8b6914 100%);
      border: 1px solid var(--brass-light);
      color: var(--wood-darkest);
      font-family: var(--font-serif-zh);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.3em;
      padding: 16px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 32px;
      box-shadow: 0 4px 16px rgba(212, 175, 55, 0.3);
    }

    .btn-start:hover:not(:disabled) {
      background: linear-gradient(180deg, var(--brass-light) 0%, var(--brass) 100%);
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(212, 175, 55, 0.5);
    }

    .btn-start:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .error-msg {
      background: rgba(200, 50, 50, 0.2);
      border: 1px solid rgba(200, 50, 50, 0.4);
      color: #ffcccc;
      padding: 12px 16px;
      border-radius: 4px;
      margin-top: 16px;
      font-size: 14px;
      display: none;
    }

    .error-msg.show { display: block; }

    .error-actions {
      display: none;
      margin-top: 12px;
      gap: 10px;
      flex-wrap: wrap;
    }

    .error-actions.show {
      display: flex;
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid rgba(212, 175, 55, 0.35);
      color: var(--paper);
      font-family: var(--font-serif-zh);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.18em;
      padding: 10px 14px;
      border-radius: 4px;
      cursor: pointer;
    }

    .btn-secondary:hover {
      background: rgba(244, 236, 216, 0.06);
    }

    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(26, 15, 8, 0.95);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 1000;
    }

    .loading-overlay.show { display: flex; }

    .loading-spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(212, 175, 55, 0.2);
      border-top-color: var(--brass-light);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 24px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-family: var(--font-display);
      font-style: italic;
      color: var(--brass);
      font-size: 15px;
      letter-spacing: 0.3em;
    }
  </style>
</head>
<body>
  <div class="startup-container">
    <div class="logo">
      <span class="logo-mark">A · I · P · M</span>
      <span class="logo-subtitle">— Product Management Roundtable —</span>
    </div>

    <form id="startupForm">
      <div class="form-group">
        <label for="projectName">项目名称</label>
        <input
          type="text"
          id="projectName"
          name="projectName"
          placeholder="如：大学生兼职App"
          maxlength="30"
          required
        />
        <div class="hint">仅限中文/字母/数字/-/_，长度 2-30</div>
      </div>

      <div class="form-group">
        <label for="idea">你的想法</label>
        <textarea
          id="idea"
          name="idea"
          placeholder="用一两句话描述你想做什么产品..."
          required
        ></textarea>
        <div class="hint">越具体越好，周明会基于这个想法提问</div>
      </div>

      <button type="submit" class="btn-start" id="btnStart">
        启动流水线
      </button>

      <div class="error-msg" id="errorMsg"></div>
      <div class="error-actions" id="errorActions">
        <button type="button" class="btn-secondary" id="btnOpenExisting">继续进入已有项目</button>
      </div>
    </form>
  </div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">正在创建项目...</div>
  </div>

  <script>
    const API_BASE = (location.protocol === 'file:' ? 'http://localhost:3000' : location.origin) + '/api';

    const form = document.getElementById('startupForm');
    const btnStart = document.getElementById('btnStart');
    const errorMsg = document.getElementById('errorMsg');
    const errorActions = document.getElementById('errorActions');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const btnOpenExisting = document.getElementById('btnOpenExisting');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const projectName = document.getElementById('projectName').value.trim();
      const idea = document.getElementById('idea').value.trim();

      if (!projectName || !idea) {
        showError('项目名称和想法都不能为空');
        return;
      }

      btnStart.disabled = true;
      errorMsg.classList.remove('show');
      errorActions.classList.remove('show');
      loadingOverlay.classList.add('show');

      try {
        const response = await fetch(`${API_BASE}/projects`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: projectName,
            idea: idea,
            userPersona: 'default',
          }),
        });

        const rawText = await response.text();
        const result = rawText ? JSON.parse(rawText) : {};

        if (!response.ok || !result.success) {
          throw new Error(result.error?.message || '创建项目失败');
        }

        // 成功：先进入周明单人圆桌开场，再进入答题页
        const projectId = result.data.projectId;
        const intro = '好，我会用六个维度问你，把这个想法尽量问透。你只管按直觉回答，我们先把阶段 0 立住。';
        const nextUrl = `stage0.html?project=${encodeURIComponent(projectId)}`;
        window.location.href =
          `theatre.html?mode=solo&speaker=zhou-ming&project=${encodeURIComponent(projectId)}&stage=00&message=${encodeURIComponent(intro)}&next=${encodeURIComponent(nextUrl)}`;

      } catch (err) {
        console.error('创建项目失败:', err);
        showError(err.message || '网络错误，请检查后端服务是否启动', projectName);
        btnStart.disabled = false;
        loadingOverlay.classList.remove('show');
      }
    });

    btnOpenExisting.addEventListener('click', () => {
      const projectName = document.getElementById('projectName').value.trim();
      if (!projectName) return;
      window.location.href = `status.html?project=${encodeURIComponent(projectName)}`;
    });

    function showError(msg, projectName) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('show');
      const isExistingProject = msg.includes('项目已存在');
      errorActions.classList.toggle('show', isExistingProject && !!projectName);
    }
  </script>
</body>
</html>
