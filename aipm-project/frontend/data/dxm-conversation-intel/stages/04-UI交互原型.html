.badge-repay{color:#10B981}

.badge-complaint{color:#EF4444}

.badge-vip{background:#D29922;color:#0E1117;border:none;font-weight:700;height:18px;padding:0 6px;font-size:10px}

.kbd{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 4px;font-family:JetBrains Mono,monospace;font-size:11px;border:1px solid #30363D;border-bottom-width:2px;border-radius:3px;background:#1A1F29;color:#8B949E}

/* 数据表格 */
table.data-table{width:100%;border-collapse:collapse;font-size:12px}
table.data-table thead th{position:sticky;top:0;background:#1A1F29;text-align:left;font-weight:600;color:#8B949E;height:36px;padding:0 12px;border-bottom:1px solid #30363D;text-transform:uppercase;font-size:10px;letter-spacing:0.5px;z-index:10}
table.data-table tbody tr{height:36px;border-bottom:1px solid #21262D;cursor:pointer}
table.data-table tbody tr:hover{background:#21262D}
table.data-table tbody tr.selected{background:#2D333B;border-left:2px solid #2967FF}
table.data-table tbody td{padding:0 12px;color:#E6EDF3;vertical-align:middle}
table.data-table tbody tr:nth-child(even){background:rgba(255,255,255,0.015)}

/* 透明度禁用 */
.disabled{opacity:0.5;pointer-events:none}

/* 焦点环 */
button:focus-visible,input:focus-visible,a:focus-visible{outline:2px solid #2967FF;outline-offset:2px}

.toast{position:fixed;bottom:24px;right:24px;min-width:280px;max-width:400px;padding:12px 16px;border-radius:8px;background:#1A1F29;border:1px solid #30363D;color:#E6EDF3;font-size:13px;z-index:9999;animation:slideIn 0.25s ease}
.toast.success{border-color:#3FB950}
.toast.warn{border-color:#D29922}
.toast.danger{border-color:#F85149}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* 模态 */
.modal-mask{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:9990;display:flex;align-items:center;justify-content:center}
.modal{width:600px;background:#1A1F29;border:1px solid #30363D;border-radius:12px;padding:24px}

.kbd-hint-bar{position:sticky;bottom:0;height:28px;display:flex;align-items:center;gap:16px;padding:0 16px;background:#0E1117;border-top:1px solid #21262D;color:#8B949E;font-size:11px}

.prompt-code{font-family:JetBrains Mono,Consolas,monospace;font-size:12px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.prompt-code .comment{color:#6E7681}
.prompt-code .var{color:#2967FF}
.prompt-code .key{color:#58A6FF}
.prompt-code .str{color:#3FB950}

.gauge-bg{stroke:#30363D;stroke-width:8;fill:none}

function kpiCard(title,value,trend,dir){
  return `<div class="kpi-card">
    <div class="kpi-title">${title}</div>
    <div class="kpi-value">${value}</div>
    <div class="kpi-trend ${dir==='down'?'down':''}">${dir==='down'?'↓':'↑'} ${trend}</div>
  </div>`;
}

function donutSVG(items){
  const total = items.reduce((s,i)=>s+i.count,0);
  let acc = 0;
  const r = 60, cx=80, cy=80;
  return items.map(it=>{
    const start = acc/total * Math.PI*2 - Math.PI/2;
    acc += it.count;
    const end = acc/total * Math.PI*2 - Math.PI/2;
    const large = (end-start)>Math.PI?1:0;
    const x1 = cx+r*Math.cos(start), y1 = cy+r*Math.sin(start);
    const x2 = cx+r*Math.cos(end), y2 = cy+r*Math.sin(end);
    return `<path d="M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z" fill="${it.color}" opacity="0.85"/>`
  }).join('') + `<circle cx="80" cy="80" r="42" fill="#1A1F29"/>`;
}

function highlightPrompt(text){
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^(#.+)$/gm,'<span class="comment">$1</span>')
    .replace(/(\{\{[a-z_]+\}\})/g,'<span class="var">$1</span>');
}
function highlightJSON(text){
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("[^"]+")(\s*:)/g,'<span class="key">$1</span>$2')
    .replace(/:(\s*"[^"]+")/g,':<span class="str">$1</span>');
}

function renderTrendLines(){
  // 模拟 7 天 4 类对话量
  const data = {
    edu: [80,85,92,88,94,98,94],
    rate: [55,62,58,68,72,70,67],
    repay: [40,42,38,45,48,46,47],
    complaint: [30,32,35,38,40,42,39]
  };
  const colors = {edu:'#3B82F6',rate:'#8B5CF6',repay:'#10B981',complaint:'#EF4444'};
  const w = 400, h = 200, pad = 30;
  const yMax = 110;
  const labels = ['周一','周二','周三','周四','周五','周六','周日'];
  const xScale = i => pad + (w-pad*2) * (i/(labels.length-1));
  const yScale = v => h-pad - (h-pad*2) * (v/yMax);

  let svg = '';
  // 网格
  for(let i=0;i<=4;i++){
    const y = pad + (h-pad*2)*(i/4);
    svg += `<line x1="${pad}" y1="${y}" x2="${w-pad}" y2="${y}" stroke="#21262D" stroke-width="1"/>`;
  }
  // 文字
  labels.forEach((l,i)=>{
    svg += `<text x="${xScale(i)}" y="${h-10}" font-size="10" fill="#6E7681" text-anchor="middle">${l}</text>`;
  });
  // 4 条线
  Object.keys(data).forEach(k=>{
    const pts = data[k].map((v,i)=>`${xScale(i)},${yScale(v)}`).join(' ');
    svg += `<polyline points="${pts}" fill="none" stroke="${colors[k]}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
    data[k].forEach((v,i)=>{
      svg += `<circle cx="${xScale(i)}" cy="${yScale(v)}" r="3" fill="${colors[k]}"/>`;
    });
  });
  return svg;
}

// ============ 全局键盘 ============
document.addEventListener('keydown', e=>{
  if(['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)) return;
  const cur = MOCK.conversations.findIndex(c=>c.id===selectedConvId);
  if(e.key==='j'||e.key==='ArrowDown'){
    selectedConvId = MOCK.conversations[Math.min(cur+1,MOCK.conversations.length-1)].id;
    render();
  }else if(e.key==='k'||e.key==='ArrowUp'){
    selectedConvId = MOCK.conversations[Math.max(cur-1,0)].id;
    render();
  }else if(e.key==='l'){
    toast('已标记已读','success');
  }else if(e.key==='/'){
    e.preventDefault();
    $('#globalSearch').focus();
  }else if(e.key==='Escape'){
    if(currentRoute==='conv-detail') nav('conversations');
  }
});
