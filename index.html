<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>张晋垚作品集</title>
  <style>
    :root {
      --bg: #f4f1ea;
      --card: rgba(255, 255, 255, 0.82);
      --text: #1f2521;
      --muted: #5d6a61;
      --accent: #0d6b57;
      --accent-2: #c96f3b;
      --border: rgba(31, 37, 33, 0.08);
      --shadow: 0 18px 50px rgba(41, 54, 46, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(13, 107, 87, 0.14), transparent 30%),
        radial-gradient(circle at bottom right, rgba(201, 111, 59, 0.14), transparent 24%),
        linear-gradient(180deg, #f7f3ed 0%, #efe8dd 100%);
      min-height: 100vh;
    }

    .wrap {
      width: min(980px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0 64px;
    }

    .hero,
    .card {
      background: var(--card);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 36px;
      margin-bottom: 24px;
    }

    h1,
    h2 {
      margin: 0 0 12px;
      line-height: 1.15;
    }

    h1 {
      font-size: clamp(32px, 6vw, 56px);
      letter-spacing: -0.03em;
    }

    h2 {
      font-size: 24px;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    .card {
      padding: 24px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 20px;
    }

    a.button,
    a.text-link {
      text-decoration: none;
    }

    a.button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
    }

    a.button.alt {
      background: var(--accent-2);
    }

    a.text-link {
      color: var(--accent);
      font-weight: 600;
    }

    ul {
      margin: 16px 0 0;
      padding-left: 20px;
      color: var(--muted);
      line-height: 1.8;
    }

    .footer {
      margin-top: 24px;
      text-align: center;
      font-size: 14px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>张晋垚作品集</h1>
      <p>这个公开页面只收录指定路径中的作品文件，支持在线打开 HTML 原型，也支持下载文档、图片和完整项目压缩包。</p>
      <div class="actions">
        <a class="button" href="./岛游智选/岛游智选-app原型.html">打开 App 原型</a>
        <a class="button alt" href="./岛游智选/岛游智选-web原型.html">打开 Web 原型</a>
        <a class="text-link" href="./NEXUS-AI原型链接.docx">下载 Word 文档</a>
      </div>
    </section>

    <section class="grid">
      <article class="card">
        <h2>项目内容</h2>
        <ul>
          <li>岛游智选 App 原型</li>
          <li>岛游智选 Web 原型</li>
          <li>产品文档与实现方案</li>
          <li>项目相关图片素材</li>
        </ul>
      </article>

      <article class="card">
        <h2>下载方式</h2>
        <ul>
          <li>直接点开仓库中的单个文件即可下载</li>
          <li>Word、Markdown、PNG 文件都可以单独保存</li>
          <li>也可以使用 GitHub 的 Download ZIP 下载完整项目</li>
        </ul>
      </article>
    </section>

    <p class="footer">Powered by GitHub Pages</p>
  </main>
</body>
</html>
